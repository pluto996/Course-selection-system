<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - 智能排课系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 440px; width: 100%; }
    .strength-bar { height: 6px; border-radius: 3px; transition: all 0.3s; }
  </style>
</head>
<body>
  <div class="card p-4">
    <h5 class="fw-bold mb-1"><i class="bi bi-key me-2 text-primary"></i>修改密码</h5>
    <p class="text-muted small mb-3">请设置新密码（长度≥8位，含字母和数字）</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" id="cpForm" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold">旧密码</label>
        <input type="password" class="form-control" name="old_password" required>
      </div>
      <div class="mb-2">
        <label class="form-label fw-semibold">新密码</label>
        <input type="password" class="form-control" name="new_password" id="newPwd" required>
        <div class="mt-1">
          <div class="strength-bar bg-secondary w-100" id="strengthBar"></div>
          <small id="strengthText" class="text-muted"></small>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">确认新密码</label>
        <input type="password" class="form-control" name="confirm_password" id="confirmPwd" required>
        <div class="invalid-feedback">两次密码不一致</div>
      </div>
      <button type="submit" class="btn btn-primary w-100">确认修改</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const newPwd = document.getElementById('newPwd');
    const confirmPwd = document.getElementById('confirmPwd');
    const bar = document.getElementById('strengthBar');
    const txt = document.getElementById('strengthText');

    newPwd.addEventListener('input', function() {
      const v = this.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[a-zA-Z]/.test(v)) score++;
      if (/\d/.test(v)) score++;
      if (/[^a-zA-Z0-9]/.test(v)) score++;
      const colors = ['bg-danger','bg-warning','bg-info','bg-success'];
      const labels = ['弱','中','强','很强'];
      const widths = ['25%','50%','75%','100%'];
      bar.className = 'strength-bar ' + (colors[score-1] || 'bg-secondary');
      bar.style.width = widths[score-1] || '0%';
      txt.textContent = score > 0 ? '密码强度：' + labels[score-1] : '';
    });

    confirmPwd.addEventListener('blur', function() {
      if (this.value !== newPwd.value) {
        this.classList.add('is-invalid');
      } else {
        this.classList.remove('is-invalid');
        this.classList.add('is-valid');
      }
    });
  </script>
</body>
</html>
