<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能排课系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="main-background"></div>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="/">
                <div class="brand-icon">
                    <i class="bi bi-grid-3x3-gap-fill"></i>
                </div>
                <span>智能排课系统 <small class="opacity-50" style="font-size: 0.7em;">Pro</small></span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 gap-1">
                    <li class="nav-item"><a class="nav-link px-3 rounded-pill {{ 'active' if page == 'home' else '' }}" href="/"><i class="bi bi-house-door-fill me-1"></i> 首页</a></li>
                    <li class="nav-item"><a class="nav-link px-3 rounded-pill {{ 'active' if page == 'schedule' else '' }}" href="/schedule"><i class="bi bi-calendar-week-fill me-1"></i> 课表</a></li>
                    <li class="nav-item"><a class="nav-link px-3 rounded-pill {{ 'active' if page == 'generate' else '' }}" href="/generate"><i class="bi bi-cpu-fill me-1"></i> 生成</a></li>
                    <li class="nav-item"><a class="nav-link px-3 rounded-pill {{ 'active' if page == 'data' else '' }}" href="/data"><i class="bi bi-database-fill me-1"></i> 数据</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5 position-relative" style="z-index: 1;">
        {% block content %}{% endblock %}
    </div>

    <!-- Modals Block outside container to avoid stacking context issues -->
    {% block modals %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
