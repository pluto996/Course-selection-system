{% extends "role_base.html" %}
{% block title %}冲突热力图 - 排课可视化{% endblock %}

{% block content %}
<div class="page-header">
  <h4><i class="bi bi-grid-3x3 me-2 text-primary"></i>时段冲突热力图</h4>
</div>

<div class="card">
  <div class="card-body">
    <div id="noDataMsg" class="text-center text-muted py-5 d-none">
      <i class="bi bi-inbox fs-1 d-block mb-2"></i>暂无排课数据
    </div>
    <div id="heatmapContainer" style="overflow-x:auto"></div>
    <!-- 图例 -->
    <div class="d-flex align-items-center gap-2 mt-3" id="legendRow" style="display:none!important">
      <small class="text-muted">冲突数：</small>
      <div style="width:120px;height:14px;background:linear-gradient(to right,#fff,#dc3545);border:1px solid #dee2e6;border-radius:3px"></div>
      <small class="text-muted">0 → 高</small>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="{{ url_for('static', filename='js/heatmap.js') }}"></script>
{% endblock %}
