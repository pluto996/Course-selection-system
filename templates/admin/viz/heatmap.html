{% extends "role_base.html" %}
{% block title %}冲突热力图 - 排课可视化{% endblock %}

{% block content %}
<div class="page-header">
  <h4><i class="bi bi-grid-3x3 me-2 text-primary"></i>时段冲突热力图</h4>
</div>

<div class="card">
  <div class="card-body">
    <div id="noDataMsg" class="text-center text-muted py-5 d-none">
      <i class="bi bi-inbox fs-1 d-block mb-2"></i>暂无排课数据
    </div>
    <div id="heatmapContainer" style="overflow-x:auto"></div>
    <!-- 图例 -->
    <div class="d-flex align-items-center gap-2 mt-3" id="legendRow" style="display:none!important">
      <small class="text-muted">冲突数：</small>
      <div style="width:120px;height:14px;background:linear-gradient(to right,#fff,#dc3545);border:1px solid #dee2e6;border-radius:3px"></div>
      <small class="text-muted">0 → 高</small>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const DAYS = ['周一','周二','周三','周四','周五'];
const SECTIONS = ['第1节','第2节','第3节','第4节','第5节','第6节','第7节','第8节'];

fetch('/api/viz/heatmap')
  .then(r => r.json())
  .then(matrix => {
    if (!matrix || matrix.length === 0) {
      document.getElementById('noDataMsg').classList.remove('d-none');
      return;
    }

    const maxVal = Math.max(...matrix.flat(), 1);
    const colorScale = d3.scaleSequential(d3.interpolateReds).domain([0, maxVal]);

    const cellSize = 70;
    const marginLeft = 60;
    const marginTop = 40;
    const width = marginLeft + SECTIONS.length * cellSize + 20;
    const height = marginTop + DAYS.length * cellSize + 20;

    const svg = d3.create('svg').attr('width', width).attr('height', height);

    // 列标题（节次）
    SECTIONS.forEach((sec, j) => {
      svg.append('text')
        .attr('x', marginLeft + j * cellSize + cellSize / 2)
        .attr('y', marginTop - 8)
        .attr('text-anchor', 'middle')
        .style('font-size', '12px')
        .style('fill', '#555')
        .text(sec);
    });

    // 行标题（星期）
    DAYS.forEach((day, i) => {
      svg.append('text')
        .attr('x', marginLeft - 8)
        .attr('y', marginTop + i * cellSize + cellSize / 2)
        .attr('text-anchor', 'end')
        .attr('dominant-baseline', 'middle')
        .style('font-size', '13px')
        .style('fill', '#333')
        .text(day);
    });

    // 热力格子
    matrix.forEach((row, i) => {
      row.forEach((val, j) => {
        const g = svg.append('g');
        g.append('rect')
          .attr('x', marginLeft + j * cellSize + 2)
          .attr('y', marginTop + i * cellSize + 2)
          .attr('width', cellSize - 4)
          .attr('height', cellSize - 4)
          .attr('rx', 6)
          .attr('fill', val === 0 ? '#f8f9fa' : colorScale(val))
          .attr('stroke', '#dee2e6')
          .attr('stroke-width', 1);

        g.append('text')
          .attr('x', marginLeft + j * cellSize + cellSize / 2)
          .attr('y', marginTop + i * cellSize + cellSize / 2)
          .attr('text-anchor', 'middle')
          .attr('dominant-baseline', 'middle')
          .style('font-size', '14px')
          .style('font-weight', val > 0 ? '700' : '400')
          .style('fill', val > maxVal * 0.6 ? '#fff' : '#333')
          .text(val);

        // Tooltip
        g.append('title').text(`${DAYS[i]} ${SECTIONS[j]}：${val} 个冲突`);
      });
    });

    document.getElementById('heatmapContainer').appendChild(svg.node());
    document.getElementById('legendRow').style.removeProperty('display');
  })
  .catch(() => document.getElementById('noDataMsg').classList.remove('d-none'));
</script>
{% endblock %}
