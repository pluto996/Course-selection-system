<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 智能排课系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.97);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
    }
    .login-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .login-logo i { font-size: 2rem; color: #fff; }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,.2); }
    .btn-login {
      background: linear-gradient(135deg, #0d6efd, #6610f2);
      border: none;
      padding: 0.65rem;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
    .btn-login:hover { opacity: 0.9; }
    .input-group-text { background: #f8f9fa; }
    .countdown-badge { font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <i class="bi bi-calendar3"></i>
    </div>
    <h4 class="text-center fw-bold mb-1">智能排课系统</h4>
    <p class="text-center text-muted small mb-3">请登录您的账号</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
          <i class="bi bi-{% if category == 'danger' %}exclamation-circle{% elif category == 'success' %}check-circle{% else %}info-circle{% endif %} me-1"></i>
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% if lock_message %}
      <div class="alert alert-warning py-2">
        <i class="bi bi-lock-fill me-1"></i>
        {{ lock_message }}
        <span id="countdown" class="badge bg-warning text-dark ms-2 countdown-badge"></span>
      </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate>
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">用户名</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="请输入用户名" autocomplete="username" required>
          <div class="invalid-feedback">请输入用户名</div>
        </div>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">密码</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="请输入密码" autocomplete="current-password" required>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd" tabindex="-1">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
          <div class="invalid-feedback">请输入密码</div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-login w-100 text-white rounded-3">
        <i class="bi bi-box-arrow-in-right me-1"></i>登 录
      </button>
    </form>

    <p class="text-center text-muted small mt-3 mb-0">
      <i class="bi bi-shield-check me-1"></i>默认管理员账号：admin / Admin123
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
  {% if lock_message %}
  <script>
    (function() {
      let remaining = 15 * 60;
      const el = document.getElementById('countdown');
      function tick() {
        if (remaining <= 0) { el.textContent = '可以重试'; return; }
        const m = Math.floor(remaining / 60), s = remaining % 60;
        el.textContent = m + ':' + String(s).padStart(2, '0');
        remaining--;
        setTimeout(tick, 1000);
      }
      tick();
    })();
  </script>
  {% endif %}
</body>
</html>
